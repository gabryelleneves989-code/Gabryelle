<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Neves Fight - Sistema</title>

<style>
body {
    font-family: Arial;
    background: #ffffff; /* fundo branco */
    color: #000000;
    text-align: center;
    margin: 0;
}

h1 {
    color: #000000;
    font-weight: bold; /* negrito */
}

input, select {
    padding: 8px;
    margin: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 8px;
    background: #007bff; /* azul padrão */
    color: white; 
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
}

th {
    background: #f2f2f2;
    color: #000000;
    font-weight: bold;
}

.container {
    padding: 10px;
}

.hidden {
    display: none;
}

.contadores {
    margin-top: 10px;
    font-weight: bold;
}

/* Responsivo */
@media(max-width: 600px){
    input, select {
        width: 90%;
    }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h1>🔐 Neves Fight</h1>
    <input type="password" id="senha" placeholder="Digite a senha">
    <br>
    <button onclick="entrar()">Entrar</button>
</div>

<!-- SISTEMA -->
<div id="sistema" class="hidden">

<h1>🥋 Sistema de Alunos</h1>

<div class="container">

<input type="text" id="nome" placeholder="Nome completo">
<input type="number" id="idade" placeholder="Idade">

<select id="turma">
<option value="">Turma</option>
<option>Manhã</option>
<option>Tarde</option>
<option>Noite</option>
</select>

<input type="text" id="mestre" placeholder="Mestre responsável">

<select id="tipo">
<option value="">Tipo</option>
<option>Karatê</option>
<option>Personal</option>
</select>

<input type="text" id="telefone" placeholder="Telefone">
<input type="date" id="data">

<br>
<button onclick="adicionarAluno()">Cadastrar / Atualizar</button>
<button onclick="exportarCSV()">Exportar CSV</button>

<br><br>

<input type="text" id="busca" placeholder="Buscar por nome" onkeyup="renderizar()">

<select id="filtro" onchange="renderizar()">
<option value="">Todos</option>
<option>Karatê</option>
<option>Personal</option>
</select>

<div class="contadores">
<span id="totalAlunos">Total: 0</span> |
<span id="totalKarate">Karatê: 0</span> |
<span id="totalPersonal">Personal: 0</span>
</div>

</div>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Idade</th>
<th>Turma</th>
<th>Mestre</th>
<th>Tipo</th>
<th>Telefone</th>
<th>Data</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

</div>

<script>
let editarIndex = -1; // Para controle de edição

// LOGIN SIMPLES
function entrar(){
    let senha = document.getElementById("senha").value;

    if(senha === "1234"){ // você pode mudar a senha aqui
        document.getElementById("login").classList.add("hidden");
        document.getElementById("sistema").classList.remove("hidden");
        renderizar();
    } else {
        alert("Senha incorreta!");
    }
}

// SALVAR NO NAVEGADOR
function pegarDados(){
    return JSON.parse(localStorage.getItem("alunos") || "[]");
}

function salvarDados(dados){
    localStorage.setItem("alunos", JSON.stringify(dados));
}

// ADICIONAR / ATUALIZAR
function adicionarAluno(){
    let dados = pegarDados();

    let aluno = {
        nome: nome.value,
        idade: idade.value,
        turma: turma.value,
        mestre: mestre.value,
        tipo: tipo.value,
        telefone: telefone.value,
        data: data.value
    };

    if(Object.values(aluno).includes("")){
        alert("Preencha tudo!");
        return;
    }

    if(editarIndex >= 0){
        dados[editarIndex] = aluno;
        editarIndex = -1;
    } else {
        dados.push(aluno);
    }

    salvarDados(dados);
    limpar();
    renderizar();
}

// LIMPAR CAMPOS
function limpar(){
    nome.value = "";
    idade.value = "";
    turma.value = "";
    mestre.value = "";
    tipo.value = "";
    telefone.value = "";
    data.value = "";
}

// EXCLUIR
function excluir(index){
    let dados = pegarDados();
    dados.splice(index,1);
    salvarDados(dados);
    renderizar();
}

// EDITAR
function editar(index){
    let dados = pegarDados();
    let aluno = dados[index];

    nome.value = aluno.nome;
    idade.value = aluno.idade;
    turma.value = aluno.turma;
    mestre.value = aluno.mestre;
    tipo.value = aluno.tipo;
    telefone.value = aluno.telefone;
    data.value = aluno.data;

    editarIndex = index;
}

// RENDERIZAR
function renderizar(){
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    let dados = pegarDados();
    let busca = document.getElementById("busca").value.toLowerCase();
    let filtro = document.getElementById("filtro").value;

    let total = 0;
    let totalK = 0;
    let totalP = 0;

    dados.forEach((aluno, index) => {

        if(busca && !aluno.nome.toLowerCase().includes(busca)) return;
        if(filtro && aluno.tipo !== filtro) return;

        total++;
        if(aluno.tipo === "Karatê") totalK++;
        if(aluno.tipo === "Personal") totalP++;

        let linha = `
        <tr>
        <td>${aluno.nome}</td>
        <td>${aluno.idade}</td>
        <td>${aluno.turma}</td>
        <td>${aluno.mestre}</td>
        <td>${aluno.tipo}</td>
        <td>${aluno.telefone}</td>
        <td>${aluno.data}</td>
        <td>
            <button onclick="editar(${index})">✏️</button>
            <button onclick="excluir(${index})">❌</button>
        </td>
        </tr>
        `;

        lista.innerHTML += linha;
    });

    document.getElementById("totalAlunos").innerText = `Total: ${total}`;
    document.getElementById("totalKarate").innerText = `Karatê: ${totalK}`;
    document.getElementById("totalPersonal").innerText = `Personal: ${totalP}`;
}

// EXPORTAR CSV
function exportarCSV(){
    let dados = pegarDados();
    if(dados.length === 0){
        alert("Não há dados para exportar!");
        return;
    }

    let csv = "Nome,Idade,Turma,Mestre,Tipo,Telefone,Data\n";
    dados.forEach(a => {
        csv += `${a.nome},${a.idade},${a.turma},${a.mestre},${a.tipo},${a.telefone},${a.data}\n`;
    });

    let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "alunos.csv";
    link.click();
}
</script>

</body>
</html>
